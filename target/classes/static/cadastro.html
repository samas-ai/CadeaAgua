<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema</title>
    <link rel="icon" href="assets/peixe.png" type="image/x-icon">
    <style>
        /* Configurações Globais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
        }

        /* Fundo com a imagem enviada */
        .background-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;

            background-image: url("https://images.pexels.com/photos/14770896/pexels-photo-14770896.jpeg");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
        }

        /* Card de Cadastro */
        .form-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        header h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 5px;
        }

        header p {
            color: #666;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* Inputs */
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group-row {
            display: flex;
            gap: 12px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background-color: #f9f9f9;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #318a94;
        }

        /* Botão */
        .btn-submit {
            background-color: #318a94;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: #266b74;
        }

        /* Footer do Card */
        footer {
            margin-top: 20px;
            font-size: 0.85rem;
        }

        footer a {
            color: #266b74;
            text-decoration: none;
            font-weight: bold;
        }

        /* --- RESPONSIVIDADE (Mobile) --- */
        @media (max-width: 600px) {
            .background-container {
                background-image: none;
                background-color: #ffffff;
                align-items: flex-start;
                padding: 0;
            }

            .form-card {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
                box-shadow: none;
                padding: 30px 20px;
            }

            header h1 {
                font-size: 1.6rem;
                text-align: left;
            }

            header p {
                text-align: left;
            }

            .input-group-row {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
<div class="background-container">
    <main class="form-card">
        <header>
            <h1>Cadastre-se</h1>
            <p>Crie sua própria conta</p>
        </header>

        <form onsubmit="cadastrar(event)">
            <div class="input-group-row">
                <input type="text" id="nome" placeholder="Nome" required>
                <input type="text" id="sobrenome" placeholder="Sobrenome" required>
            </div>

            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="senha" placeholder="Senha" required>

            <input type="text" id="rua" placeholder="Rua" required>

            <div class="input-group-row">
                <input type="text" id="bairro" placeholder="Bairro" required>
                <input type="text" id="cidade" placeholder="Cidade (ex: Patos)" required>
            </div>

            <input type="text" id="cep" placeholder="CEP (ex: 58700-000)" required>

            <button type="submit" class="btn-submit">Criar Conta</button>
        </form>

        <footer>
            <p>Já tem uma conta? <a href="#" onclick="irLogin()">Realizar login</a></p>
        </footer>
    </main>
</div>

<script>
    async function cadastrar(event) {
        event.preventDefault();

        const usuario = {
            nome: document.getElementById("nome").value,
            email: document.getElementById("email").value,
            senha: document.getElementById("senha").value,
            endereco: {
                rua: document.getElementById("rua").value,
                bairro: document.getElementById("bairro").value,
                cidade: document.getElementById("cidade").value,
                cep: document.getElementById("cep").value
            }
        };

        try {
            const response = await fetch("http://localhost:8080/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(usuario)
            });

            if (response.ok) {
                alert("Cadastro realizado com sucesso!");
                window.location.href = "login.html";
            } else {
                const erro = await response.text();
                alert("Erro no cadastro: " + erro);
            }
        } catch (error) {
            alert("Erro ao conectar com o servidor.");
        }
    }

    function irLogin() {
        window.location.href = "login.html";
    }
</script>
</body>
</html>
